<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>星辰粒子 · 互动宇宙</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif;touch-action:none;-webkit-tap-highlight-color:transparent}
canvas{display:block;position:fixed;top:0;left:0}
.overlay{position:fixed;inset:0;pointer-events:none;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
.title{font-size:clamp(40px,8vw,90px);font-weight:900;color:#fff;text-shadow:0 0 80px rgba(120,120,255,.6),0 0 160px rgba(200,100,255,.3);animation:titleGlow 3s ease-in-out infinite;letter-spacing:-1px}
@keyframes titleGlow{0%,100%{text-shadow:0 0 60px rgba(120,120,255,.5),0 0 120px rgba(200,100,255,.25)}50%{text-shadow:0 0 100px rgba(120,120,255,.8),0 0 200px rgba(200,100,255,.5)}}
.subtitle{font-size:clamp(16px,3vw,22px);color:rgba(255,255,255,.6);margin-top:12px;letter-spacing:4px;font-weight:300}
.hint{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.35);font-size:14px;z-index:10;letter-spacing:2px;pointer-events:none;animation:hintPulse 2s ease-in-out infinite}
@keyframes hintPulse{0%,100%{opacity:.3}50%{opacity:.7}}
</style>
</head>
<body>
<canvas id=c></canvas>
<div class=overlay>
  <div class=title>星辰粒子</div>
  <div class=subtitle>INTERACTIVE  UNIVERSE</div>
</div>
<div class=hint>移动手指 · 触碰星辰</div>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d')
let W,H,mx=0,my=0,touch=false,particles=[],time=0
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight}
resize();window.addEventListener('resize',resize)

class Particle{
  constructor(){
    this.reset()
    this.y=Math.random()*H
  }
  reset(){
    this.x=Math.random()*W;this.y=-20
    this.size=Math.random()*2.5+.5
    this.speed=.3+Math.random()*1.5
    this.opacity=.3+Math.random()*.7
    this.hue=200+Math.random()*160 // blue to pink range
    this.wobble=Math.random()*Math.PI*2
    this.wobbleSpeed=.01+Math.random()*.03
  }
  update(){
    this.y+=this.speed
    this.wobble+=this.wobbleSpeed
    this.x+=Math.sin(this.wobble)*.3
    // 鼠标吸引
    if(touch||mx){
      let dx=mx-this.x,dy=my-this.y,dist=Math.sqrt(dx*dx+dy*dy)
      if(dist<200){
        let force=(200-dist)/200
        this.x+=dx*force*.03
        this.y+=dy*force*.03
        this.opacity=Math.min(1,this.opacity+.02)
        this.size=Math.min(4,this.size+.05)
      }
    }
    if(this.y>H+20)this.reset()
    if(this.x<-20)this.x=W+20
    if(this.x>W+20)this.x=-20
  }
  draw(){
    ctx.beginPath()
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2)
    ctx.fillStyle=`hsla(${this.hue},80%,70%,${this.opacity})`
    ctx.fill()
    // 发光
    if(this.opacity>.6){
      ctx.beginPath()
      ctx.arc(this.x,this.y,this.size*2.5,0,Math.PI*2)
      ctx.fillStyle=`hsla(${this.hue},80%,70%,${this.opacity*.15})`
      ctx.fill()
    }
  }
}

// 连接线
class Connection{
  constructor(a,b){this.a=a;this.b=b}
  draw(){
    let dx=this.a.x-this.b.x,dy=this.a.y-this.b.y
    let dist=Math.sqrt(dx*dx+dy*dy)
    if(dist<100){
      ctx.beginPath()
      ctx.moveTo(this.a.x,this.a.y)
      ctx.lineTo(this.b.x,this.b.y)
      let alpha=(100-dist)/100*.15
      ctx.strokeStyle=`rgba(150,180,255,${alpha})`
      ctx.lineWidth=.5
      ctx.stroke()
    }
  }
}

// 大星光点
class Star{
  constructor(){
    this.x=Math.random()*W
    this.y=Math.random()*H
    this.size=1+Math.random()*2
    this.twinkle=Math.random()*Math.PI*2
    this.speed=.02+Math.random()*.05
  }
  draw(){
    this.twinkle+=this.speed
    let alpha=.3+Math.sin(this.twinkle)*.3
    ctx.beginPath()
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2)
    ctx.fillStyle=`rgba(255,255,255,${alpha})`
    ctx.fill()
  }
}

for(let i=0;i<200;i++)particles.push(new Particle())
let stars=[];for(let i=0;i<80;i++)stars.push(new Star())

function animate(){
  ctx.fillStyle='rgba(0,0,0,.15)'
  ctx.fillRect(0,0,W,H)
  time++
  stars.forEach(s=>s.draw())
  particles.forEach(p=>{p.update();p.draw()})
  // 连线
  for(let i=0;i<particles.length;i+=3){
    for(let j=i+1;j<Math.min(i+8,particles.length);j++){
      new Connection(particles[i],particles[j]).draw()
    }
  }
  // 鼠标周围粒子爆发
  if(touch&&time%3===0){
    for(let i=0;i<3;i++){
      let p=new Particle()
      p.x=mx+(Math.random()-.5)*40
      p.y=my+(Math.random()-.5)*40
      p.size=2+Math.random()*3
      p.opacity=1
      p.hue=260+Math.random()*100
      particles.push(p)
    }
    if(particles.length>400)particles.splice(0,particles.length-400)
  }
  requestAnimationFrame(animate)
}

document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY})
document.addEventListener('touchmove',e=>{e.preventDefault();mx=e.touches[0].clientX;my=e.touches[0].clientY;touch=true},{passive:false})
document.addEventListener('touchstart',e=>{mx=e.touches[0].clientX;my=e.touches[0].clientY;touch=true})
document.addEventListener('touchend',()=>{touch=false})
document.addEventListener('mouseleave',()=>{mx=0;my=0})

animate()
</script>
</body>
</html>
